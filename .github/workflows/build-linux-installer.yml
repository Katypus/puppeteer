name: Build Linux Installer
on:
workflow_dispatch:
push:
tags:
- "v*"

jobs:
build-linux:
runs-on: ubuntu-latest
steps:
- name: Checkout
uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install system deps
    run: |
      sudo apt-get update
      sudo apt-get install -y patchelf dpkg-dev fakeroot

  - name: Install Python deps
    run: |
      python -m pip install --upgrade pip
      pip install -r [requirements.txt](http://_vscodecontentref_/3) pyinstaller

  - name: Build Linux binaries
    run: |
      pyinstaller --onefile --clean --name puppeteer-host [native_messaging_host.py](http://_vscodecontentref_/4)
      pyinstaller --onefile --clean --name puppeteer-backend [backend_launcher.py](http://_vscodecontentref_/5)

  - name: Stage package tree
    run: |
      mkdir -p pkgroot/opt/puppeteer/backend
      mkdir -p pkgroot/usr/lib/mozilla/native-messaging-hosts
      mkdir -p pkgroot/DEBIAN

      cp dist/puppeteer-host pkgroot/opt/puppeteer/backend/
      cp dist/puppeteer-backend pkgroot/opt/puppeteer/backend/
      cp packaging/linux/puppeteer_native_host.sh pkgroot/opt/puppeteer/backend/
      chmod +x pkgroot/opt/puppeteer/backend/puppeteer_native_host.sh

      cp packaging/linux/com.puppeteer.native.json pkgroot/usr/lib/mozilla/native-messaging-hosts/

      cat > pkgroot/DEBIAN/control << 'EOF'
      Package: puppeteer-native-backend
      Version: 0.1.0
      Section: utils
      Priority: optional
      Architecture: amd64
      Maintainer: Your Name <you@example.com>
      Description: Puppeteer FastAPI backend and Firefox native messaging host
      EOF

  - name: Build deb
    run: |
      dpkg-deb --build pkgroot puppeteer-native-backend_0.1.0_amd64.deb

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: linux-installer
      path: |
        puppeteer-native-backend_0.1.0_amd64.deb
        dist/puppeteer-host
        dist/puppeteer-backend