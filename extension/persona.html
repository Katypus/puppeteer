<!doctype html>
<html>
  <head>
    <title>Personas</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        margin: 16px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .tab {
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      .tab.active {
        border-color: #333;
        font-weight: 600;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .status {
        font-size: 12px;
        opacity: 0.8;
      }
      .card {
        border: 1px solid #e3e3e3;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .card h3 {
        margin: 0 0 6px 0;
        font-size: 16px;
      }
      .meta {
        font-size: 12px;
        opacity: 0.8;
      }
      .error {
        color: #b00020;
        white-space: pre-wrap;
      }
      .empty {
        opacity: 0.8;
      }
      code {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
      }
    </style>
  </head>
  <body>
    <h1>Persona Manager</h1>

    <div class="row">
      <div class="tabs" role="tablist" aria-label="Persona views">
        <button
          class="tab active"
          id="tab-accessible"
          data-route="/personas"
          role="tab"
        >
          Accessible
        </button>
        <button
          class="tab"
          id="tab-public"
          data-route="/personas/public"
          role="tab"
        >
          Public
        </button>
        <button
          class="tab"
          id="tab-mine"
          data-route="/personas/mine"
          role="tab"
        >
          Mine
        </button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div id="error" class="error" style="display: none"></div>
    <div id="persona-list"></div>

    <form id="persona-form">
      <label>Name</label>
      <br />
      <input type="text" id="name" required />
      <br />
      <label>Description</label>
      <br />
      <textarea id="description"></textarea>
      <br />

      <!-- BROWSING BEHAVIORS -->
      <label>Risk</label>
      <br />
      <div class="slider">
        <input type="range" id="risk" min="0" max="10" step="1" />
      </div>
      <br />
      <label>Attention</label>
      <br />
      <div class="slider">
        <input type="range" id="attention" min="0" max="10" step="1" />
      </div>
      <br />
      <label>Patience</label>
      <br />
      <div class="slider">
        <input type="range" id="patience" min="0" max="10" step="1" />
      </div>
      <br />
      <label>Interests (comma-separated)</label>
      <br />
      <textarea id="interests"></textarea>
      <br />
      <!-- DEMOGRAPHIC INFO -->
      <label>Race</label>
      <br />
      <select id="race">
        <option value="white">White</option>
        <option value="black">Black</option>
        <option value="asian">Asian</option>
        <option value="hispanic">Hispanic</option>
        <option value="middle-eastern">Middle Eastern</option>
        <option value="native-american">Native American</option>
        <option value="mixed">Mixed</option>
        <option value="other">Other</option>
      </select>
      <br />
      <label>Politics</label>
      <div class="slider">
        <input type="range" id="politics" min="0" max="10" step="1" />
      </div>
      <label>Age</label>
      <br />
      <input type="number" id="age" min="0" max="3000" />
      <br />
      <label>Gender</label>
      <br />
      <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="non-binary">Non-Binary</option>
        <option value="other">Other</option>
      </select>
      <br />

      <label>Public?</label>
      <input type="checkbox" id="is_public" />
      <br />
      <button type="submit">Create Persona</button>
    </form>
    <div class="row" style="gap: 8px">
      <button id="runBtn">Run on this tab</button>
      <button id="stopBtn">Stop on this tab</button>
    </div>
    <script src="persona.js"></script>
  </body>
</html>
