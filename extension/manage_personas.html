<!doctype html>
<html>
  <head>
    <title>Personas</title>
    <style>
      @font-face {
        font-family: "PixelifySans";
        src: url("PixelifySans-VariableFont_wght.ttf") format("truetype");
      }
      body {
        font-family: "PixelifySans", sans-serif;
        margin: 0;
        padding: 0;
        background: #bca371;
        color: #1b264f;
      }
      .nav-bar {
        display: flex;
        gap: 8px;
        margin: 0;
        background: #ad7d7d;
        padding: 12px 16px;
        color: #1b264f;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-btn {
        padding: 8px 16px;
        border: none;
        background: #ad7d7d;
        color: inherit;
        cursor: pointer;
        font-size: 21px;
        font-family: "PixelifySans", sans-serif;
      }
      .nav-btn.active {
        border-bottom: 3px solid #a63a50;
        font-weight: 600;
        margin-bottom: -11px;
        font-family: "PixelifySans", sans-serif;
      }
      h1,
      h2 {
        font-family: "PixelifySans", sans-serif;
        text-align: center;
      }
      h2 {
        font-size: 2rem;
        margin-top: 0.5rem;
        margin-bottom: 1rem;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }
      #page-create.active {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #persona-form-preview {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: center;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .status {
        font-size: 12px;
        opacity: 0.8;
        text-align: center;
      }
      .card {
        border: 1px solid #ad7d7d;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .card h3 {
        margin: 0 0 6px 0;
        font-size: 16px;
      }
      .meta {
        font-size: 12px;
        opacity: 0.8;
      }
      .error {
        color: #b00020;
        white-space: pre-wrap;
      }
      .card.selected {
        border-color: #a63a50;
        background: #f0f8ff;
      }
      code {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
      }
      .banner {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .banner img {
        width: 70%;
        height: auto;
      }
      .persona-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 12px;
        text-align: center;
      }
      .persona-card {
        border: 1px solid #ad7d7d;
        background: #ad7d7d;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .persona-card:hover {
        border-color: #a63a50;
        box-shadow: 0 2px 8px rgba(0, 123, 255, 0.1);
      }
      .persona-card.selected {
        border-color: #a63a50;
        background: rgb(150, 97, 97);
        border-width: 2px;
      }
      .sprite-container {
        width: 200px;
        height: 200px;
        position: relative;
        border: 1px solid #999;
        background: #ddd;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .sprite-container img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .persona-card h3 {
        margin: 0 0 4px 0;
        font-size: 14px;
        word-break: break-word;
      }
      .persona-card p {
        margin: 0 0 8px 0;
        font-size: 12px;
        opacity: 0.7;
      }
      .select-btn {
        padding: 6px 12px;
        background: #a63a50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .select-btn:hover {
        background: #5e1120;
      }
      .curtain-left,
      .curtain-right {
        position: fixed;
        top: 125px;
        height: calc(100vh - 125px);
        width: auto;
        max-width: 20%;
        z-index: 10;
        pointer-events: none;
      }
      .curtain-left {
        left: 0;
      }
      .curtain-right {
        right: 0;
      }
      .curtain-left img,
      .curtain-right img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .empty {
        text-align: center;
        padding: 40px 20px;
        opacity: 0.7;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: #a63a50;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #a63a50;
        cursor: pointer;
      }
      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #a63a50;
        cursor: pointer;
        border: none;
      }
      .slider {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .slider-value {
        font-size: 14px;
        color: #1b264f;
        min-width: 20px;
      }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <img src="sprite/puppeteerlogo.png" alt="Puppeteer" width="250" />
      <button class="nav-btn active" data-page="public">PUBLIC PUPPETS</button>
      <button class="nav-btn" data-page="mine">MY PUPPETS</button>
      <button class="nav-btn" data-page="create">CREATE A PUPPET</button>
    </div>

    <div class="curtain-left">
      <img src="sprite/curtainsL.png" alt="Left Curtain" />
    </div>
    <div class="curtain-right">
      <img src="sprite/curtainsR.png" alt="Right Curtain" />
    </div>

    <div id="error" class="error" style="display: none"></div>

    <!-- Create Persona Page -->
    <div id="page-create" class="page" style="padding: 16px">
      <div id="persona-form-preview">
        <form id="persona-form" style="flex: 1; min-width: 360px">
          <label>Name</label>
          <br />
          <input type="text" id="name" required />
          <br />
          <label>Description</label>
          <br />
          <textarea id="description"></textarea>
          <br />

          <!-- BROWSING BEHAVIORS -->
          <label>Risk</label>
          <br />
          <div class="slider">
            <input type="range" id="risk" min="1" max="10" step="1" value="5" />
            <span class="slider-value" id="risk-value">5</span>
          </div>
          <br />
          <label>Attention</label>
          <br />
          <div class="slider">
            <input
              type="range"
              id="attention"
              min="1"
              max="10"
              step="1"
              value="5"
            />
            <span class="slider-value" id="attention-value">5</span>
          </div>
          <br />
          <label>Patience</label>
          <br />
          <div class="slider">
            <input
              type="range"
              id="patience"
              min="1"
              max="10"
              step="1"
              value="5"
            />
            <span class="slider-value" id="patience-value">5</span>
          </div>
          <br />
          <label>Interests (comma-separated)</label>
          <br />
          <textarea id="interests"></textarea>
          <br />
          <!-- DEMOGRAPHIC INFO -->
          <label>Race</label>
          <br />
          <select id="race">
            <option value="white">White</option>
            <option value="black">Black</option>
            <option value="asian">Asian</option>
            <option value="hispanic">Hispanic</option>
            <option value="middle-eastern">Middle Eastern</option>
            <option value="native-american">Native American</option>
            <option value="mixed">Mixed</option>
            <option value="other">Other</option>
          </select>
          <br />
          <label>Politics</label>
          <div class="slider">
            <input
              type="range"
              id="politics"
              min="1"
              max="10"
              step="1"
              value="5"
            />
            <span class="slider-value" id="politics-value">5</span>
          </div>
          <label>Age</label>
          <br />
          <input type="number" id="age" min="0" max="3000" />
          <br />
          <label>Gender</label>
          <br />
          <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="non-binary">Non-Binary</option>
            <option value="other">Other</option>
          </select>
          <br />

          <label>Public?</label>
          <input type="checkbox" id="is_public" />
          <br />
          <button type="submit">Create Persona</button>
        </form>

        <div
          id="sprite-preview-column"
          style="
            width: 256px;
            display: flex;
            flex-direction: column;
            align-items: center;
          "
        >
          <h2 style="margin: 0 0 8px 0">Sprite Preview</h2>
          <div
            id="sprite-window"
            style="
              width: 256px;
              height: 256px;
              position: relative;
              border: 1px solid #999;
              background: #ddd;
              overflow: hidden;
            "
          >
            <img
              id="sprite-politics"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 256px;
                height: 256px;
              "
            />
            <img
              id="sprite-race"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 256px;
                height: 256px;
              "
            />
            <img
              id="sprite-risk"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 256px;
                height: 256px;
              "
            />
            <img
              id="sprite-age"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 256px;
                height: 256px;
              "
            />
            <img
              id="sprite-gender"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 256px;
                height: 256px;
              "
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Public Page -->
    <div id="page-public" class="page active" style="padding: 16px">
      <h2>PUBLIC PUPPETS</h2>
      <div class="status" id="status-public"></div>
      <div id="persona-list-public" class="persona-grid"></div>
    </div>

    <!-- Mine Page -->
    <div id="page-mine" class="page" style="padding: 16px">
      <h2>MY PUPPETS</h2>
      <div class="status" id="status-mine"></div>
      <div id="persona-list-mine" class="persona-grid"></div>
    </div>

    <script src="manage_personas.js"></script>
  </body>
</html>
